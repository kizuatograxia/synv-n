name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Version tag (optional)'
        required: false
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  validate:
    name: Validate Before Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd app && npm ci

      - name: Validate Prisma schema
        run: |
          cd app && npx prisma validate

      - name: Type check
        run: |
          cd app && npx tsc --noEmit

      - name: Lint
        run: |
          cd app && npm run lint

      - name: Run tests
        run: |
          cd app && npm test -- --passWithNoTests

  build-and-push:
    name: Build and Push Docker Image
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CONTAINER_REGISTRY }}
          username: ${{ secrets.CONTAINER_USERNAME }}
          password: ${{ secrets.CONTAINER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.CONTAINER_REGISTRY }}/bileto
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ secrets.APP_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            # Pull latest image
            echo "Pulling Docker image..."
            docker pull ${{ needs.build-and-push.outputs.image-tag }}

            # Stop existing containers
            echo "Stopping existing containers..."
            docker-compose down

            # Update image tag in docker-compose.yml
            sed -i "s|image: .*|image: ${{ needs.build-and-push.outputs.image-tag }}|g" docker-compose.yml

            # Start new containers
            echo "Starting new containers..."
            docker-compose up -d

            # Wait for app to be healthy
            echo "Waiting for app to be healthy..."
            sleep 10

            # Run database migrations
            echo "Running database migrations..."
            docker-compose exec -T app npx prisma migrate deploy

            # Health check
            echo "Running health check..."
            curl -f http://localhost:3000/api/health || exit 1

            echo "Deployment successful!"

  health-check:
    name: Post-Deploy Health Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check API health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.APP_URL }}/api/health)
          if [ $response -eq 200 ]; then
            echo "Health check passed!"
          else
            echo "Health check failed with status code: $response"
            exit 1
          fi

      - name: Check main page loads
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.APP_URL }}/)
          if [ $response -eq 200 ]; then
            echo "Main page check passed!"
          else
            echo "Main page check failed with status code: $response"
            exit 1
          fi

      - name: Verify no critical errors
        run: |
          # Check for server errors in response
          curl -s ${{ secrets.APP_URL }}/api/health | grep -i "error" && exit 1 || echo "No errors detected"

  rollback-on-failure:
    name: Rollback on Failure
    needs: [deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Rollback deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            echo "Deployment failed! Rolling back..."

            # Rollback to previous image
            PREVIOUS_IMAGE=$(docker images --format="{{.Repository}}:{{.Tag}}" | grep bileto | sort -r | sed -n '2p')

            if [ -z "$PREVIOUS_IMAGE" ]; then
              echo "No previous image found for rollback!"
              exit 1
            fi

            echo "Rolling back to: $PREVIOUS_IMAGE"

            # Stop current containers
            docker-compose down

            # Update to previous image
            sed -i "s|image: .*|image: $PREVIOUS_IMAGE|g" docker-compose.yml

            # Start containers with previous image
            docker-compose up -d

            # Wait for rollback to complete
            sleep 10

            echo "Rollback complete!"

      - name: Notify rollback
        run: |
          echo "ROLLBACK TRIGGERED: Deployment health checks failed"
          echo "Please investigate the issue before retrying deployment"
